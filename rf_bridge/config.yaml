name: RF Bridge
version: "0.5.8"
slug: rf_bridge
description: >-
  Transforme des profils d'appareil en appareils Home Assistant, via MQTT
  discovery. Générique : il ne connaît aucune télécommande, il applique le
  profil qu'on lui donne. Fonctionne sans RF Lab — importe un profil et c'est
  tout.
url: https://github.com/powange/broadlink-lab/tree/main/rf_bridge
arch:
  - aarch64
  - amd64
init: false

# UI d'administration : importer un profil, voir ce qui est chargé, et pourquoi
# un profil serait refusé. Sans ça, ajouter un appareil imposerait d'aller
# déposer un fichier via Samba, donc d'installer RF Lab pour rien.
ingress: true
ingress_port: 8098
panel_icon: mdi:remote
panel_title: RF Bridge
panel_admin: true

host_network: true

# Le broker MQTT (addon Mosquitto). `need` = le pont refuse de démarrer sans.
services:
  - mqtt:need

# rw : le pont accepte l'import d'un profil, il ne fait pas que lire.
map:
  - share:rw

options:
  device_ip: ""
  profiles: []
  log_level: info

schema:
  device_ip: str?
  # Vide = tous les profils de /share/broadlink_lab/. Sinon, la liste des ids voulus.
  profiles:
    - str?
  log_level: list(trace|debug|info|warning|error)?
