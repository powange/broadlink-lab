name: RF Lab
version: "0.4.2"
slug: rf_lab
description: >-
  Rétro-ingénierie de télécommandes RF via un Broadlink RM4 Pro. Capture, diffé,
  nomme les champs, génère des trames inédites — et exporte un profil d'appareil
  que l'addon RF Bridge transforme en appareil Home Assistant.
url: https://github.com/powange/broadlink-lab/tree/main/rf_lab
arch:
  - aarch64
  - amd64
init: false

# Ingress : l'UI s'ouvre directement dans la sidebar HA, pas de port exposé.
ingress: true
ingress_port: 8099
panel_icon: mdi:radio-tower
panel_title: RF Lab
panel_admin: true

# Nécessaire pour la découverte Broadlink (broadcast UDP sur :80).
# Si tu renseignes device_ip en dur, tu peux passer host_network à false.
host_network: true

# /share : c'est là que le labo dépose les profils d'appareil que RF Bridge lira.
# Le seul lien entre les deux addons — ils ne se parlent jamais directement.
map:
  - share:rw

options:
  device_ip: ""
  frequency: 433.92
  log_level: info

schema:
  device_ip: str?
  frequency: float(300,930)
  log_level: list(trace|debug|info|warning|error)?
